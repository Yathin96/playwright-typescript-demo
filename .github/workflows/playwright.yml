name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily regression run at 04:30 UTC (10:00 IST).
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # TypeScript must compile under strict mode before any test runs.
      - run: npm run typecheck
      # No browsers needed for the API project — keeps this job under a minute.
      - run: npx playwright test --project=api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: test-results/
          retention-days: 7

  ui:
    name: UI tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # One browser failing should not hide the results of the others.
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.project }}
      - run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            allure-results/
          retention-days: 7
